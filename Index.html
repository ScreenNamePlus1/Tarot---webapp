<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Tarot - Complete Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .font-mystic {
            font-family: 'Cinzel', serif;
        }
        
        .card-container {
            perspective: 1000px;
            width: 300px;
            height: 500px;
            cursor: pointer;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(147, 51, 234, 0.3);
        }
        
        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .card-back::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(212, 175, 55, 0.1) 10px,
                rgba(212, 175, 55, 0.1) 20px
            );
            animation: shimmer 20s linear infinite;
        }
        
        .card-back-pattern {
            width: 80%;
            height: 80%;
            border: 2px solid #d4af37;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        
        .card-back-symbol {
            font-size: 80px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: pulse 3s ease-in-out infinite;
        }
        
        .card-front {
            background: linear-gradient(135deg, #f5f5f0 0%, #e8e6e1 100%);
            transform: rotateY(180deg);
            border: 8px solid #d4af37;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-front::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.3;
        }
        
        @keyframes shimmer {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        .glow-text {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5), 0 0 20px rgba(212, 175, 55, 0.3);
        }
        
        .card-header {
            background: linear-gradient(to bottom, #d4af37, #b8941f);
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #8b6914;
        }
        
        .card-image-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        .card-symbol {
            font-size: 100px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        
        .card-footer {
            background: linear-gradient(to top, #d4af37, #b8941f);
            padding: 15px;
            text-align: center;
            border-top: 2px solid #8b6914;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }
        
        .meaning-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .suit-wands { color: #d97706; }
        .suit-cups { color: #2563eb; }
        .suit-swords { color: #dc2626; }
        .suit-pentacles { color: #059669; }
        .suit-major { color: #7c3aed; }
    </style>
</head>

        let isFlipped = false;
        let currentCard = null;

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.opacity = Math.random();
                starsContainer.appendChild(star);
            }
        }

        function getRandomCard() {
            return tarotCards[Math.floor(Math.random() * tarotCards.length)];
        }

        function flipCard() {
            if (isFlipped) return;
            
            const container = document.getElementById('cardContainer');
            const meaningSection = document.getElementById('meaningSection');
            const resetBtn = document.getElementById('resetBtn');
            
            currentCard = getRandomCard();
            
            document.getElementById('cardName').textContent = currentCard.name;
            document.getElementById('cardNumber').textContent = `${currentCard.number} - ${currentCard.suit.charAt(0).toUpperCase() + currentCard.suit.slice(1)}`;
            document.getElementById('cardSymbol').textContent = currentCard.symbol;
            document.getElementById('cardKeywords').textContent = currentCard.keywords;
            document.getElementById('cardMeaning').textContent = currentCard.meaning;
            document.getElementById('uprightMeaning').textContent = currentCard.upright;
            document.getElementById('reversedMeaning').textContent = currentCard.reversed;
            
            // Color coding by suit
            const symbolElement = document.getElementById('cardSymbol');
            symbolElement.className = `card-symbol suit-${currentCard.suit}`;
            
            container.classList.add('flipped');
            isFlipped = true;
            
            setTimeout(() => {
                meaningSection.classList.remove('hidden');
                setTimeout(() => {
                    meaningSection.classList.remove('opacity-0', 'translate-y-4');
                }, 50);
            }, 400);
            
            setTimeout(() => {
                resetBtn.classList.remove('hidden');
            }, 800);
        }

        function resetCard() {
            const container = document.getElementById('cardContainer');
            const meaningSection = document.getElementById('meaningSection');
            const resetBtn = document.getElementById('resetBtn');
            
            meaningSection.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                meaningSection.classList.add('hidden');
            }, 500);
            
            resetBtn.classList.add('hidden');
            
            setTimeout(() => {
                container.classList.remove('flipped');
                isFlipped = false;
            }, 300);
        }

        createStars();

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (!isFlipped) {
                    flipCard();
                } else {
                    resetCard();
                }
            }
        });
